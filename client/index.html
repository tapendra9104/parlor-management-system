<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- SEO Meta Tags -->
    <title>SalonFlow — Premium Salon Management System</title>
    <meta name="description" content="SalonFlow is a premium salon management platform. Book appointments, manage staff, track payments, and deliver exceptional beauty experiences with AI-powered tools." />
    <meta name="keywords" content="salon management, appointment booking, beauty salon, hair salon, spa booking, salon software" />
    <meta name="author" content="SalonFlow" />
    
    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SalonFlow — Premium Salon Management" />
    <meta property="og:description" content="Book appointments, manage staff, and track payments. Premium beauty experiences powered by AI." />
    <meta property="og:url" content="https://parlor-management-system.vercel.app" />
    <meta property="og:site_name" content="SalonFlow" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SalonFlow — Premium Salon Management" />
    <meta name="twitter:description" content="Book appointments, manage staff, and track payments. Premium beauty experiences powered by AI." />
    
    <!-- Theme & Icons -->
    <meta name="theme-color" content="#C9345C" />
    <meta name="theme-color" content="#0B0B14" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SalonFlow" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Google Fonts Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />
    
    <!-- Razorpay Checkout Script -->
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
  </head>
  <body>
    <noscript>
      <div style="padding: 40px; text-align: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
        <h1>SalonFlow requires JavaScript</h1>
        <p>Please enable JavaScript in your browser settings to use this application.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script nomodule>
      document.getElementById('root').innerHTML =
        '<div style="padding:40px;text-align:center;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;">' +
        '<h1>Browser Not Supported</h1>' +
        '<p>SalonFlow requires a modern browser. Please update to the latest version of Chrome, Safari, Firefox, or Edge.</p></div>';
    </script>
    <script>
      // Gap #12: PWA Service Worker Registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) { console.log('SW registered:', reg.scope); })
            .catch(function(err) { console.log('SW registration failed:', err); });
        });
      }
    </script>
  </body>
</html>
